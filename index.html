<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary Meta ───────────────────────────────────────────────────── -->

    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0d0d12" />
    <link rel="canonical" href="https://prodxstore.com/" />

    <!-- ── Favicon ────────────────────────────────────────────────────────── -->

      rel="icon"
      type="image/png"
      href="https://hercules-cdn.com/file_3y9pBv81Yd6f6aK28NIgGthc"

      href="https://hercules-cdn.com/file_3y9pBv81Yd6f6aK28NIgGthc"

    <!-- ── Open Graph ─────────────────────────────────────────────────────── -->
    <meta property="og:site_name" content="ProdXStore" />
    <meta property="og:title" content="ProdXStore — Premium Digital Products for Creators" />
    <meta
      property="og:description"
      content="Download premium digital products for designers, developers & creators. Templates, UI kits, brand assets, and more. Instant delivery. 30-day money-back guarantee."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://prodxstore.com/" />
    <meta
      property="og:image"
      content="https://hercules-cdn.com/file_3y9pBv81Yd6f6aK28NIgGthc"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter / X Card ───────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ProdXStore — Premium Digital Products for Creators" />
    <meta
      name="twitter:description"
      content="Download premium digital products for designers, developers & creators. Instant delivery. 30-day money-back guarantee."
    />
    <meta
      name="twitter:image"
      content="https://hercules-cdn.com/file_3y9pBv81Yd6f6aK28NIgGthc"
    />

    <!-- ── JSON-LD Structured Data ────────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://prodxstore.com/#website",
          "url": "https://prodxstore.com/",
          "name": "ProdXStore",
          "description": "Premium digital products for designers, developers and creators.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://prodxstore.com/?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://prodxstore.com/#organization",
          "name": "ProdXStore",
          "url": "https://prodxstore.com/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://hercules-cdn.com/file_3y9pBv81Yd6f6aK28NIgGthc"
          },
          "contactPoint": {
            "@type": "ContactPoint",
            "email": "prodxstoresupport@gmail.com",
            "contactType": "customer support"
          }
        },
        {
          "@type": "Store",
          "@id": "https://prodxstore.com/#store",
          "name": "ProdXStore",
          "description": "Premium digital products for designers, developers and creators. Instant delivery. 30-day money-back guarantee.",
          "url": "https://prodxstore.com/",
          "image": "https://hercules-cdn.com/file_3y9pBv81Yd6f6aK28NIgGthc",
          "priceRange": "$",
          "currenciesAccepted": "USD, INR",
          "paymentAccepted": "Credit Card, Debit Card, UPI, Net Banking",
          "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Digital Products",
            "itemListElement": [
              { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Design Templates" } },
              { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "UI Kits" } },
              { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Brand Identity Kits" } }
            ]
          }
        }
      ]
    }
    </script>

    <!-- ── Fonts (DM Sans + Playfair Display only) ────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
      crossorigin
    />

    <!-- Detect dark mode preference before React loads to avoid flash of unstyled content -->
    <script>
      try {
        let theme = localStorage.getItem("theme");
        if (theme === "system" || !theme) {
          let prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          theme = prefersDark ? "dark" : "light";
        }
        document.documentElement.classList.add(theme);
      } catch (e) {}
    </script>

    <link href="/src/index.css" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
